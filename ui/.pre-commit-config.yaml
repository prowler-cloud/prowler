orphan: true

repos:
  - repo: local
    hooks:
      # P0 - Formatters: write fixes on staged files; prek re-stages.
      - id: ui-prettier
        name: UI - Prettier (write, staged)
        entry: pnpm exec prettier --write --ignore-unknown
        language: system
        files: '\.(ts|tsx|js|jsx|json|css|md)$'
        pass_filenames: true
        priority: 0

      - id: ui-lint
        name: UI - ESLint (fix, staged)
        entry: pnpm exec eslint --fix --max-warnings 0 --no-warn-ignored
        language: system
        files: '\.(ts|tsx|js|jsx)$'
        pass_filenames: true
        priority: 1

      # P10 - Project-wide validators (TypeScript is fundamentally project-wide).
      - id: ui-typecheck
        name: UI - TypeScript Check
        entry: pnpm run typecheck
        language: system
        files: '\.(ts|tsx|js|jsx)$'
        pass_filenames: false
        priority: 10

      - id: ui-tests
        name: UI - Unit Tests
        entry: pnpm exec vitest related --run
        language: system
        files: '\.(ts|tsx|js|jsx)$'
        exclude: '\.test\.|\.spec\.|vitest\.config|vitest\.setup'
        pass_filenames: true
        priority: 10
