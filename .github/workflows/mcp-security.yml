name: 'MCP: Security'

on:
  push:
    branches:
      - 'master'
      - 'v5.*'
    paths:
      - 'mcp_server/pyproject.toml'
      - 'mcp_server/uv.lock'
      - '.github/workflows/mcp-security.yml'
      - '.github/actions/osv-scanner/**'
      - '.github/scripts/osv-scan.sh'
  pull_request:
    branches:
      - 'master'
      - 'v5.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  mcp-security-scans:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write # osv-scanner action posts/updates a PR comment with findings

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            api.osv.dev:443
            api.deps.dev:443
            osv-vulnerabilities.storage.googleapis.com:443

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # zizmor: ignore[artipacked]
          persist-credentials: true # Required by tj-actions/changed-files to fetch PR branch

      - name: Check for MCP dependency changes
        id: check-changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            mcp_server/pyproject.toml
            mcp_server/uv.lock
            .github/workflows/mcp-security.yml
            .github/actions/osv-scanner/**
            .github/scripts/osv-scan.sh

      - name: Dependency vulnerability scan with osv-scanner
        if: steps.check-changes.outputs.any_changed == 'true'
        uses: ./.github/actions/osv-scanner
        with:
          lockfile: mcp_server/uv.lock
