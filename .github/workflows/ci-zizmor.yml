name: 'CI: Zizmor'

on:
  push:
    branches:
      - 'master'
      - 'v5.*'
    paths:
      - '.github/**'
  pull_request:
    branches:
      - 'master'
      - 'v5.*'
    paths:
      - '.github/**'
  schedule:
    - cron: '30 06 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  zizmor:
    if: github.repository == 'prowler-cloud/prowler'
    name: GitHub Actions Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            api.github.com:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Exclude *.lock.yml (gh-aw auto-generated) — zizmor has no --exclude flag
      - name: Collect non-generated workflow files
        id: collect
        run: echo "files=$(find .github -name '*.yml' -o -name '*.yaml' | grep -v '\.lock\.yml$' | sort | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          inputs: ${{ steps.collect.outputs.files }}
          token: ${{ github.token }}
