name: 'Tools: TruffleHog'

on:
  push:
    branches:
      - 'master'
      - 'v5.*'
  pull_request:
    branches:
      - 'master'
      - 'v5.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          # We can't block as Trufflehog needs to verify secrets against vendors
          egress-policy: audit
          # allowed-endpoints: >
          #   github.com:443
          #   ghcr.io:443
          #   pkg-containers.githubusercontent.com:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # PRs only need the diff range; push to master/release walks the new range from event.before.
          # 50 is enough headroom for the longest realistic PR/push chain without paying for a full clone.
          fetch-depth: 50
          persist-credentials: false

      - name: Scan PR diff for secrets with TruffleHog
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@ef6e76c3c4023279497fab4721ffa071a722fd05 # v3.92.4
        with:
          extra_args: --results=verified,unknown --since-commit ${{ github.event.pull_request.base.sha }} --branch ${{ github.event.pull_request.head.ref }}

      - name: Scan push diff for secrets with TruffleHog
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@ef6e76c3c4023279497fab4721ffa071a722fd05 # v3.92.4
        with:
          # github.event.before is the previous head; on first push to a branch it's the zero SHA — fall back to scanning the latest commit only.
          extra_args: --results=verified,unknown --since-commit ${{ github.event.before == '0000000000000000000000000000000000000000' && github.sha || github.event.before }}
